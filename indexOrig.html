<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./3rd-party/bootstrap/bootstrap.min.css">
    <script type="text/javascript" src="./3rd-party/bootstrap/bootstrap.min.js"></script>
    <title>English network</title>
</head>

<div class="bg-white shadow-lg border-b-2 border-slate-100 py-4 min-h-[24px] fixed top-0 left-0 w-full flex flex-row">
    <h1 class="font-semibold text-xl pl-4">EnglishNetwork</h1>
</div>

<body>


    <div id="myModal"></div>
    <svg id="container" width="100%" height="100vh" viewBox="0 0 1000 500"></svg>
    <script type="module">
        import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
        const width = 1000;
        const height = 500;
        
        const drawGraph = async () => {
            // Extract the data
            const data = await d3.json('data/data.json');

            let nodes = data.people.map(d => ({...d}));
            const links = data.relationships.map(d => ({...d}));
            console.log(nodes);
            console.log(links);

            // Initialize color
            const color = d3.scaleOrdinal(d3.schemeTableau10);

            // Create a simulation with several forces.
            const simulation = d3.forceSimulation(nodes)
            .force("link", d3.forceLink(links).id(d => d.id).distance(200))
            .force("charge", d3.forceManyBody().strength(-100))
            .force("center", d3.forceCenter(width/2, height/2))
            .on("tick", ticked);

            const svg = d3.select("svg");

            // Draw the lines
            const link = svg.append("g")
            .selectAll()
                .data(links)
                .join("line")
                .attr("stroke-width", 3)
                .attr("stroke", "#999")
                .attr("data-bs-toggle", "modal")
                .attr("data-bs-target", d => `#relationship-${d.id}`);;

            // Draw the nodes
            const node = svg.append("g")
            .attr("stroke-width", 3)
            .selectAll()
                .data(nodes)
                .join("circle")
                .attr("aria-labelledby", d => d.name)
                .attr("r", 20)
                .attr("fill", d => color(d.id+1))
                .attr("stroke", "#999")
                .attr("data-bs-toggle", "modal")
                .attr("data-bs-target", d => `#bio-${d.id}`);
            
            // Add names as texts to nodes
            const text = svg.append("g")
            .selectAll()
                .data(nodes)
                .join("text")
                .text(d => d.name);

            // Add a title tag to each node
            node.append("title")
            .text(d => d.name);

            // Add a drag behavior.
            node.call(d3.drag()
            .on("start", dragstarted)
            .on("drag", dragged)
            .on("end", dragended));

            node
            .on("mouseover", (event) => {
                event.target.style.stroke = '#000';
            })
            .on("mouseout", (event) => {
                event.target.style.stroke = '#999';
            })

            // Add a hover effect for lines
            link
            .on("mouseover", (event) => {
                event.target.style.stroke = '#000';
            })
            .on("mouseout", (event) => {
                event.target.style.stroke = '#999';
            })

            // Update position of lines and nodes every second
            function ticked() {
                link
                    .attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);
            
                node
                    .attr("cx", d => d.x)
                    .attr("cy", d => d.y);
                text
                    .attr("x", d => d.x)
                    .attr("y", d => d.y);
            }

            // Functions to handle drag events
            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }

            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }
            
            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                event.subject.fx = null;
                event.subject.fy = null;
            }

            // Add bio models
            for (let i=0; i<nodes.length; i++) {
                const person = nodes[i];
                document.getElementById('container').insertAdjacentHTML('afterend', 
                `<div class="modal fade" id="bio-${person.id}" tabindex="-1">
                    <div class="modal-dialog modal-dialog-centered">
                      <div class="modal-content">
                        <div class="modal-header">
                          <h1 class="modal-title fs-5"><a class="text-black" href="${person.bio.fullbio}" target="_blank">${person.name}</a></h1>
                          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <div className="mt-3">
                            ${Object.keys(person.bio).map((key) => 
                                `<div><strong class="me-2">${key[0].toUpperCase() + key.slice(1) + ":"}</strong>${key === "fullbio" ? `<a href="${person.bio[key]}" target="_blank">${person.bio[key]}</a>` : person.bio[key]}</div>`
                            ).join('')}
                            </div>
                        </div>
                        <div class="modal-footer">
                          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        </div>
                      </div>
                    </div>
                </div>`)
            }

            // Add relationship models
            for (let i=0; i<links.length; i++) {
                const relationship = links[i];
                console.log(relationship);
                document.getElementById('container').insertAdjacentHTML('afterend', 
                `<div class="modal fade" id="relationship-${relationship.id}" tabindex="-1">
                    <div class="modal-dialog modal-dialog-centered">
                      <div class="modal-content">
                        <div class="modal-header">
                          <h1 class="modal-title fs-5">Relationship between <strong>${relationship.source.name}</strong> and <strong>${relationship.target.name}</strong></h1>
                          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <div class="accordion" id="letters-${relationship.id}">
                            ${relationship.letters.map((letter, letterIndex) => 
                            `<div class="accordion-item">
                                <h2 class="accordion-header">
                                    <button class="accordion-button ${letterIndex === 0 ? '' : 'collapsed'}" type="button" data-bs-toggle="collapse" data-bs-target="#letter-${letterIndex}" aria-expanded="true" aria-controls="letter-${letterIndex}">
                                        ${letter.title} - From ${nodes[letter.from].name} to ${nodes[letter.to].name}
                                    </button>
                                </h2>
                                <div id="letter-${letterIndex}" class="accordion-collapse collapse ${letterIndex === 0 ? 'show' : ''}" data-bs-parent="#letters-${relationship.id}">
                                    <div class="accordion-body">
                                        <iframe src="${letter.content}" class="w-100" style="min-height: 300px; color-scheme: light;"></iframe>
                                    </div>
                                </div>
                            </div>`    
                            ).join('')}
                            </div>
                        </div>
                        <div class="modal-footer">
                          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        </div>
                      </div>
                    </div>
                </div>`)
            }
        }

        drawGraph();
        

    </script>
</body>
</html>
